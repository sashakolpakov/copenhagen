name: C++ Verification

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: cpp-verify-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: cppcheck static analysis ────────────────────────────────────────
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --std=c++17 \
            --output-file=cppcheck.log \
            src/dynamic_ivf.cpp
          cat cppcheck.log

      - name: Upload cppcheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-log
          path: cppcheck.log
